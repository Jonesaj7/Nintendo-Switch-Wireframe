<body>

  <nav>
    <a href="../index.html">Home</a>

    <a href="FAQs.html">FAQs</a>
    <a href="troubleshooting.html">Troubleshooting</a>

  </nav>

  <main>
    <h1>Contact Support</h1>

    <p><strong>Email:</strong> support@nintendo-help.com</p>
    <p><strong>Official Support:</strong> <a href="https://www.nintendo.com/consumer/index.jsp" target="_blank">nintendo.com/support</a></p>
    <p>We typically respond within 1–2 business days.</p>

    <h2>Send a Message</h2>

    <form>
      <div>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required />
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required />
      </div>
      <div>
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Describe your issue…" required></textarea>
      </div>
      <button type="submit">Send Message</button>
    </form>

  </main>

</body>
</html>
